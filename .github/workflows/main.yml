name: Workday Reminder

on:
  schedule:
    - cron: '30 10 * * *' # 这是北京时间 18:30 (10:30 UTC)
  workflow_dispatch:      # 这行很重要，它能让你手动点击运行，方便现在就测试

jobs:
  run_script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run reminder script
        run: python remind.py
