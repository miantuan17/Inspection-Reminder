name: Workday Reminder

on:
  schedule:
    - cron: '00 03 * * *'
    - cron: '30 09 * * *'
  workflow_dispatch:

jobs:
  run_script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run reminder script
        env:
          # 将 GitHub 的 Secrets 映射给脚本的环境变量
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          FEISHU_DOC_URL: ${{ secrets.FEISHU_DOC_URL }}
        run: python remind.py
