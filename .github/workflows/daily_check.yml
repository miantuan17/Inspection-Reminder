name: Daily Reminder
on:
  schedule:
    - cron: '46 09 * * *'  # 北京时间 17:46
  workflow_dispatch:

jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install requests
        run: pip install requests
      - name: Run script
        env:
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          FEISHU_DOC_URL: ${{ secrets.FEISHU_DOC_URL }}
        run: python remind.py
